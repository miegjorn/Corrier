name: Build & push

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Corrier
    steps:
      - uses: actions/checkout@v4
        with:
          path: Corrier

      - uses: actions/checkout@v4
        with:
          repository: miegjorn/nervi
          token: ${{ secrets.MIEGJORN_CI_TOKEN }}
          path: nervi

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Run tests
        run: cargo test --workspace

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `nervi` is checked out as a sibling of `Corrier` (both under
      # $GITHUB_WORKSPACE), not nested inside it, so the Dockerfile's
      # `COPY --from=nervi` can't see it as part of the default build context.
      # `--build-context nervi=../nervi` registers it as a named context that
      # buildx's `docker-container` driver (set up by setup-buildx-action) can
      # read across the directory boundary; `--load` pulls the finished image
      # back into the local Docker engine so the plain `docker push` below can
      # find it. Same pattern as Caissa's build.yml for its own sibling
      # (Amassada/Fondament) path dependencies.
      - name: Build read-gateway
        if: github.event_name != 'pull_request'
        run: |
          docker buildx build --build-context nervi=../nervi --build-arg BIN=corrier-read-gateway --load -t ghcr.io/miegjorn/corrier:read-gateway-sha-${GITHUB_SHA::7} .
          docker push ghcr.io/miegjorn/corrier:read-gateway-sha-${GITHUB_SHA::7}

      - name: Build write-gateway
        if: github.event_name != 'pull_request'
        run: |
          docker buildx build --build-context nervi=../nervi --build-arg BIN=corrier-write-gateway --load -t ghcr.io/miegjorn/corrier:write-gateway-sha-${GITHUB_SHA::7} .
          docker push ghcr.io/miegjorn/corrier:write-gateway-sha-${GITHUB_SHA::7}
