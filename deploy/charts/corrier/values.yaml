image:
  repository: ghcr.io/miegjorn/corrier
  # CI tags images as read-gateway-sha-<sha>/write-gateway-sha-<sha> -- no
  # `latest` tag is published for this repo (unlike Caissa's), so this must
  # track a real build's sha, not a placeholder.
  tag: sha-01217fe

# ghcr.io/miegjorn/corrier is a private package -- reuses the same pull
# secret every other chart in this cluster (guilhem, component-agents) uses.
imagePullSecrets:
  - name: ghcr-creds

readGateway:
  replicas: 2
  port: 8080

writeGateway:
  replicas: 2
  components: "guilhem,gardian,fondament,farga,amassada,cor,caissa,charradissa,nervi"

matrix:
  homeserver: "http://synapse.occitan-system.svc.cluster.local:8008"

farga:
  url: "http://farga.occitan-system.svc.cluster.local:7500"

nats:
  url: "nats://nervi-nats.occitan-system.svc.cluster.local:4222"

kroki:
  url: "http://kroki.occitan-system.svc.cluster.local:8000"
